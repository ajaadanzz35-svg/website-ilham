<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Game Kartun Runner</title>

<style>
body {
    text-align: center;
    background: #111;
    color: white;
    font-family: Arial;
}

#game {
    width: 400px;
    height: 200px;
    background: #333;
    margin: auto;
    position: relative;
    overflow: hidden;
    border-radius: 10px;
}

/* KARAKTER KARTUN */
#player {
    width: 50px;
    height: 50px;
    background: #ffd166;
    position: absolute;
    bottom: 0;
    left: 50px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
}

.eyes {
    display: flex;
}

.eye {
    width: 8px;
    height: 8px;
    background: black;
    border-radius: 50%;
    margin: 2px;
}

.mouth {
    width: 20px;
    height: 10px;
    background: black;
    border-radius: 0 0 20px 20px;
    position: absolute;
    bottom: 10px;
}

/* RINTANGAN */
#obstacle {
    width: 30px;
    height: 40px;
    background: red;
    position: absolute;
    bottom: 0;
    right: -30px;
    border-radius: 5px;
}
</style>
</head>

<body>

<h1>🚀 Game Kartun Runner</h1>
<p>Skor: <span id="score">0</span></p>

<div id="game">
    <div id="player">
        <div class="eyes">
            <div class="eye"></div>
            <div class="eye"></div>
        </div>
        <div class="mouth"></div>
    </div>
    <div id="obstacle"></div>
</div>

<p>Tekan SPASI untuk lompat!</p>

<script>
let player = document.getElementById("player");
let obstacle = document.getElementById("obstacle");
let score = 0;
let jumping = false;

/* LOMPAT */
function jump() {
    if (jumping) return;
    jumping = true;

    let up = setInterval(() => {
        let bottom = parseInt(window.getComputedStyle(player).getPropertyValue("bottom"));
        if (bottom >= 100) {
            clearInterval(up);
            let down = setInterval(() => {
                let bottom = parseInt(window.getComputedStyle(player).getPropertyValue("bottom"));
                if (bottom <= 0) {
                    clearInterval(down);
                    jumping = false;
                }
                player.style.bottom = (bottom - 5) + "px";
            }, 20);
        }
        player.style.bottom = (bottom + 5) + "px";
    }, 20);
}

/* KONTROL */
document.addEventListener("keydown", function(e) {
    if (e.code === "Space") {
        jump();
    }
});

/* GERAK RINTANGAN */
function moveObstacle() {
    let right = parseInt(window.getComputedStyle(obstacle).getPropertyValue("right"));

    if (right > 430) {
        obstacle.style.right = "-30px";
        score++;
        document.getElementById("score").innerText = score;
    } else {
        obstacle.style.right = (right + 5) + "px";
    }

    let playerBottom = parseInt(window.getComputedStyle(player).getPropertyValue("bottom"));

    if (right > 320 && right < 370 && playerBottom < 40) {
        alert("Game Over! Skor kamu: " + score);
        location.reload();
    }

    requestAnimationFrame(moveObstacle);
}
moveObstacle();

/* ANIMASI KEDIP */
setInterval(() => {
    let eyes = document.querySelectorAll(".eye");
    eyes.forEach(e => e.style.height = "2px");

    setTimeout(() => {
        eyes.forEach(e => e.style.height = "8px");
    }, 150);
}, 2000);
</script>

</body>
</html>
